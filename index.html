<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/card.css" />

</head>
<body>

  <!--
    ════════════════════════════════════════════════════════
    PAGE STRUCTURE

    .page-wrapper divides the screen into two halves:
    ┌─────────────────────┬─────────────────────┐
    │                     │                     │
    │    LEFT PANEL       │    RIGHT PANEL      │
    │  (decorative)       │   (login form)      │
    │  left-panel.html    │  right-panel.html   │
    │  card.css           │  card.css           │
    │  layout.css         │  form.css           │
    │                     │                     │
    └─────────────────────┴─────────────────────┘
    ════════════════════════════════════════════════════════ -->
   <div class="page-wrapper">
        
   <!-- ══════════════════════════════
         LEFT PANEL — Decorative side
         Source : sections/left-panel.html
         Styles : css/layout.css + css/card.css
    ══════════════════════════════ -->

    <div class="left-panel">

  <!-- ── BRAND ──────────────────────────────────────────────
       Icon box + product name at the top of the panel.
  ──────────────────────────────────────────────────────────── -->
  <div class="brand">
    <!-- Gradient icon box — the emoji inside is the "logo" -->
    <!-- ✏️ CHANGE: Update emoji and product name -->
    <div class="brand-icon">⚡</div>
    <span class="brand-name">NexaAuth</span>
  </div>                    
        
    <!-- ── TAGLINE HEADING ────────────────────────────────────
       Big headline — the <span class="highlight"> words get
       a blue-purple gradient applied by card.css.
  ──────────────────────────────────────────────────────────── -->
  <!-- ✏️ CHANGE: Write your own headline -->
  <h2 class="panel-heading">
    Your gateway to<br>
    <span class="highlight">secure access</span>
  </h2>

  <!-- Short subtitle below the heading -->
  <!-- ✏️ CHANGE: 1-2 sentences about your product/service -->
  <p class="panel-subtext">
    Join thousands of teams who trust NexaAuth to protect
    their data with enterprise-grade security.
  </p>

  <!-- 3 feature bullet points -->
      <!-- ✏️ CHANGE: Your 3 key features -->
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>End-to-end encryption on all data</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>Two-factor authentication built in</span>
        </div>
        <div class="feature-item">
          <div class="feature-check">✓</div>
          <span>99.9% uptime — always available</span>
        </div>
      </div>

    
</div>  
</body>
</html>
